version: '3.8'

services:
  # PostgreSQL Database with PostGIS
  postgres:
    image: postgis/postgis:14-3.3
    container_name: riskradar_db
    environment:
      POSTGRES_DB: riskradar_db
      POSTGRES_USER: riskradar_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password_change_me}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U riskradar_user -d riskradar_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - riskradar_network
    restart: unless-stopped

  # Backend API
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: riskradar_api
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: riskradar_db
      DB_USER: riskradar_user
      DB_PASSWORD: ${DB_PASSWORD:-secure_password_change_me}
      PORT: 5000
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:-change_this_secret_in_production_min_32_chars}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./server/logs:/app/logs
      - ./server/uploads:/app/uploads
    networks:
      - riskradar_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend (Production Build)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000/api/v1}
        VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:5000}
    container_name: riskradar_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - riskradar_network
    restart: unless-stopped

  # Redis (for caching - optional)
  # redis:
  #   image: redis:7-alpine
  #   container_name: riskradar_redis
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis_data:/data
  #   networks:
  #     - riskradar_network
  #   restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  # redis_data:
  #   driver: local

networks:
  riskradar_network:
    driver: bridge
