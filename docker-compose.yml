name: risk-radar

services:
  web:
    container_name: risk-radar-web
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
        NEXT_PUBLIC_API_URL_LOCAL: ${NEXT_PUBLIC_API_URL_LOCAL:-}
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
        NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY:-}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
        NEXT_PUBLIC_SUPABASE_CRIME_TABLE: ${NEXT_PUBLIC_SUPABASE_CRIME_TABLE:-}
        NEXT_PUBLIC_NEARBY_ALERT_RADIUS_KM: ${NEXT_PUBLIC_NEARBY_ALERT_RADIUS_KM:-10}
        BACKEND_PROXY_TARGET: ${BACKEND_PROXY_TARGET:-}
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
      NEXT_PUBLIC_API_URL_LOCAL: ${NEXT_PUBLIC_API_URL_LOCAL:-}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY:-}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
      NEXT_PUBLIC_SUPABASE_CRIME_TABLE: ${NEXT_PUBLIC_SUPABASE_CRIME_TABLE:-}
      NEXT_PUBLIC_NEARBY_ALERT_RADIUS_KM: ${NEXT_PUBLIC_NEARBY_ALERT_RADIUS_KM:-10}
      BACKEND_PROXY_TARGET: ${BACKEND_PROXY_TARGET:-}
    ports:
      - "${WEB_PORT:-3000}:3000"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 30s
      timeout: 10s
      retries: 5

  mobile:
    container_name: risk-radar-mobile
    build:
      context: .
      dockerfile: apps/mobile/Dockerfile
    environment:
      EXPO_NO_TELEMETRY: 1
      EXPO_HOST: ${EXPO_HOST:-tunnel}
      EXPO_PORT: ${EXPO_PORT:-8081}
      EXPO_PUBLIC_API_URL: ${EXPO_PUBLIC_API_URL:-}
      EXPO_PUBLIC_API_URL_LOCAL: ${EXPO_PUBLIC_API_URL_LOCAL:-}
      EXPO_PUBLIC_API_TIMEOUT: ${EXPO_PUBLIC_API_TIMEOUT:-10000}
      EXPO_PUBLIC_SUPABASE_URL: ${EXPO_PUBLIC_SUPABASE_URL:-}
      EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY:-}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${EXPO_PUBLIC_SUPABASE_ANON_KEY:-}
      EXPO_PUBLIC_SUPABASE_CRIME_TABLE: ${EXPO_PUBLIC_SUPABASE_CRIME_TABLE:-}
      EXPO_PUBLIC_NEARBY_ALERT_RADIUS_KM: ${EXPO_PUBLIC_NEARBY_ALERT_RADIUS_KM:-10}
    ports:
      - "${EXPO_PORT:-8081}:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
      - "19006:19006"
    stdin_open: true
    tty: true
    restart: unless-stopped

  backend:
    container_name: risk-radar-backend
    profiles:
      - backend
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3001
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      DATABASE_URL: ${DATABASE_URL:-}
      JWT_SECRET: ${JWT_SECRET:-}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      REFRESH_TOKEN_EXPIRES_IN: ${REFRESH_TOKEN_EXPIRES_IN:-30d}
      NEARBY_ALERT_RADIUS_KM: ${NEARBY_ALERT_RADIUS_KM:-10}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:3001,http://localhost:8081,http://localhost:19006}
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3001/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 30s
      timeout: 10s
      retries: 5
